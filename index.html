<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>サンロくんのほけんしつ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f4;font-family:-apple-system,sans-serif;}
iframe{width:100%;height:100vh;border:none;display:none;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#666;}
.loading .spinner{width:40px;height:40px;border:4px solid #e5e5e5;border-top:4px solid #22c55e;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.scan-page{display:none;min-height:100vh;padding:16px;}
.scan-card{background:#fff;border-radius:16px;padding:24px 20px;max-width:400px;margin:0 auto;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.scan-icon{font-size:48px;text-align:center;margin-bottom:12px;}
.scan-card h2{color:#166534;margin-bottom:8px;font-size:18px;text-align:center;}
.scan-card>p{color:#666;font-size:13px;margin-bottom:16px;line-height:1.5;text-align:center;}
.section-label{font-size:13px;font-weight:bold;color:#333;margin:16px 0 8px;padding-left:4px;}
.section-hint{font-size:11px;color:#888;margin-bottom:8px;padding-left:4px;line-height:1.4;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:10px;}
.btn-primary{background:#22c55e;color:#fff;}
.btn-secondary{background:#e5e5e5;color:#333;}
.btn-outline{background:#fff;color:#22c55e;border:2px solid #22c55e;}
.btn-danger{background:#ef4444;color:#fff;}
#reader{width:100%;margin-bottom:12px;border-radius:8px;overflow:hidden;}
.result-box{display:none;margin-top:16px;padding:16px;background:#f0fdf4;border-radius:12px;text-align:center;}
.result-box .number{font-size:18px;font-weight:bold;color:#166534;margin-top:8px;}
.error-box{display:none;margin-top:12px;padding:12px;background:#fef2f2;border-radius:8px;text-align:center;color:#dc2626;font-size:14px;font-weight:bold;}
.manual-area{display:none;margin-top:16px;}
.manual-area input{width:100%;padding:12px;border:2px solid #e5e5e5;border-radius:8px;font-size:18px;text-align:center;margin-bottom:12px;}
.status{text-align:center;font-size:13px;color:#666;margin:8px 0;}
.divider{border:none;border-top:1px solid #e5e5e5;margin:16px 0;}
#fileInput{display:none;}
</style>
</head>
<body>
<div class="loading" id="loading">
<div class="spinner"></div>
<div>読み込み中...</div>
</div>
<iframe id="app"></iframe>
<div class="scan-page" id="scanPage">
<div class="scan-card">
<div class="scan-icon">💳</div>
<h2>ポイントカード登録</h2>

<div class="section-label">📷 実物カードをお持ちの方</div>
<div id="reader"></div>
<div class="status" id="status"></div>
<button class="btn btn-primary" id="startBtn">📷 カメラでスキャン</button>
<button class="btn btn-danger" id="stopBtn" style="display:none;">⏹ カメラを停止</button>

<hr class="divider">

<div class="section-label">📱 アプリ版をお使いの方</div>
<div class="section-hint">① 先にアプリでバーコードを表示<br>② スクリーンショットを撮る<br>③ ここに戻って↓をタップ</div>
<button class="btn btn-outline" id="fileBtn">🖼 スクショから読み取り</button>
<input type="file" id="fileInput" accept="image/*">

<hr class="divider">

<div class="section-label">✏️ うまくいかない場合</div>
<button class="btn btn-secondary" id="manualBtn">番号を手入力</button>
<div class="manual-area" id="manualArea">
<input type="text" id="manualNo" placeholder="会員番号を入力してください" inputmode="numeric">
<button class="btn btn-primary" id="manualSubmit">登録する</button>
</div>

<div class="error-box" id="errorBox"></div>

<div class="result-box" id="resultBox">
<p>✅ 登録完了！</p>
<div class="number" id="memberNo"></div>
<p style="margin-top:12px;font-size:13px;color:#666;">2秒後に自動で閉じます...</p>
</div>
</div>
</div>
<script>
var LIFF_ID='2009608282-IAzNrGIA';
var GAS_URL='https://script.google.com/macros/s/AKfycbwqJPueCoeMtpY8WcCAHQjYXIROi8VAaqsbZmuf2iUQ65MG6teaJOC2CwZiGrUNlsd6/exec';
var params=new URLSearchParams(window.location.search);
var tab=params.get('tab')||'records';
var globalUserId='';
var scanner=null;

liff.init({liffId:LIFF_ID}).then(function(){
  return liff.getProfile();
}).then(function(profile){
  globalUserId=profile.userId;
  if(tab==='scan'){showScanPage();}
  else{showIframe(profile.userId);}
}).catch(function(err){
  var userId=params.get('userId');
  if(userId){
    globalUserId=userId;
    if(tab==='scan'){showScanPage();}
    else{showIframe(userId);}
  }else{
    document.getElementById('loading').innerHTML='<div>LINEから開いてください</div>';
  }
});

function showIframe(userId){
  var iframe=document.getElementById('app');
  iframe.src=GAS_URL+'?page='+tab+'&userId='+userId;
  iframe.style.display='block';
  document.getElementById('loading').style.display='none';
}

function showScanPage(){
  document.getElementById('loading').style.display='none';
  document.getElementById('scanPage').style.display='block';
}

function validateAndExtract(code){
  var digits=code.replace(/[^0-9]/g,'');
  if(digits.length===24){
    return{valid:true,code:digits.substring(0,14)};
  }
  return{valid:false};
}

document.getElementById('startBtn').addEventListener('click',function(){
  var status=document.getElementById('status');
  document.getElementById('errorBox').style.display='none';
  status.textContent='カメラ起動中...';
  scanner=new Html5Qrcode('reader');
  scanner.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:280,height:150},formatsToSupport:[
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.ITF,
    ]},
    function(decodedText){
      status.textContent='読み取り成功！';
      scanner.stop().then(function(){registerBarcode(decodedText);});
    },
    function(errorMessage){}
  ).then(function(){
    status.textContent='バーコードをかざしてください';
    document.getElementById('startBtn').style.display='none';
    document.getElementById('stopBtn').style.display='block';
  }).catch(function(err){
    status.textContent='カメラ起動失敗: '+err;
    document.getElementById('manualArea').style.display='block';
  });
});

document.getElementById('stopBtn').addEventListener('click',function(){
  if(scanner){scanner.stop();}
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('status').textContent='';
});

document.getElementById('fileBtn').addEventListener('click',function(){
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change',function(e){
  var file=e.target.files[0];
  if(!file)return;
  var status=document.getElementById('status');
  document.getElementById('errorBox').style.display='none';
  status.textContent='画像を解析中...';
  var html5QrCode=new Html5Qrcode('reader');
  html5QrCode.scanFile(file,true).then(function(decodedText){
    status.textContent='';
    registerBarcode(decodedText);
  }).catch(function(err){
    status.textContent='';
    document.getElementById('errorBox').textContent='バーコードを検出できませんでした。手入力をお試しください。';
    document.getElementById('errorBox').style.display='block';
    document.getElementById('manualArea').style.display='block';
  });
});

document.getElementById('manualBtn').addEventListener('click',function(){
  document.getElementById('manualArea').style.display='block';
});

document.getElementById('manualSubmit').addEventListener('click',function(){
  var no=document.getElementById('manualNo').value.trim();
  if(!no){alert('番号を入力してください');return;}
  registerBarcode(no);
});

function registerBarcode(rawCode){
  if(scanner){try{scanner.stop();}catch(e){}}
  var result=validateAndExtract(rawCode);
  if(!result.valid){
    document.getElementById('errorBox').textContent='正しいバーコードを読み取ってください。';
    document.getElementById('errorBox').style.display='block';
    document.getElementById('status').textContent='';
    return;
  }
  var code=result.code;
  document.getElementById('errorBox').style.display='none';
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('manualBtn').style.display='none';
  document.getElementById('fileBtn').style.display='none';
  document.getElementById('manualArea').style.display='none';
  document.getElementById('status').textContent='登録中...';
  var img=new Image();
  img.onload=img.onerror=function(){
    document.getElementById('status').style.display='none';
    document.getElementById('resultBox').style.display='block';
    document.getElementById('memberNo').textContent='登録が完了しました';
    setTimeout(function(){
      try{liff.closeWindow();}catch(e){}
    },2000);
  };
  img.src=GAS_URL+'?page=save_barcode&userId='+globalUserId+'&barcode='+encodeURIComponent(code);
}

window.addEventListener('message',function(e){
  if(e.data==='closeLiff'){try{liff.closeWindow();}catch(e){}}
});
</script>
</body>
</html>
