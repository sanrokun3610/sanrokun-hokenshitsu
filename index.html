<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>サンロくんのほけんしつ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f4;font-family:sans-serif;}
iframe{width:100%;height:100vh;border:none;display:none;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#666;}
.loading .spinner{width:40px;height:40px;border:4px solid #e5e5e5;border-top:4px solid #22c55e;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loading" id="loading">
<div class="spinner"></div>
<div>読み込み中...</div>
</div>
<iframe id="app"></iframe>
<script>
var LIFF_ID='2009608282-IAzNrGIA';
var GAS_URL='https://script.google.com/macros/s/AKfycbwqJPueCoeMtpY8WcCAHQjYXIROi8VAaqsbZmuf2iUQ65MG6teaJOC2CwZiGrUNlsd6/exec';
var params=new URLSearchParams(window.location.search);
var tab=params.get('tab')||'records';

liff.init({liffId:LIFF_ID}).then(function(){
  return liff.getProfile();
}).then(function(profile){
  var iframe=document.getElementById('app');
  iframe.src=GAS_URL+'?page='+tab+'&userId='+profile.userId;
  iframe.style.display='block';
  document.getElementById('loading').style.display='none';
}).catch(function(err){
  var userId=params.get('userId');
  if(userId){
    var iframe=document.getElementById('app');
    iframe.src=GAS_URL+'?page='+tab+'&userId='+userId;
    iframe.style.display='block';
    document.getElementById('loading').style.display='none';
  }else{
    document.getElementById('loading').innerHTML='<div>LINEから開いてください</div>';
  }
});
</script>
</body>
</html>
