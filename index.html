<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>サンロくんのほけんしつ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f4;font-family:-apple-system,sans-serif;}
iframe{width:100%;height:100vh;border:none;display:none;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#666;}
.loading .spinner{width:40px;height:40px;border:4px solid #e5e5e5;border-top:4px solid #22c55e;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.scan-page{display:none;min-height:100vh;padding:16px;}
.scan-card{background:#fff;border-radius:16px;padding:24px 20px;max-width:400px;margin:0 auto;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.scan-icon{font-size:48px;text-align:center;margin-bottom:12px;}
.scan-card h2{color:#166534;margin-bottom:8px;font-size:18px;text-align:center;}
.section-label{font-size:13px;font-weight:bold;color:#333;margin:16px 0 8px;padding-left:4px;}
.section-hint{font-size:11px;color:#888;margin-bottom:8px;padding-left:4px;line-height:1.4;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:10px;}
.btn-primary{background:#22c55e;color:#fff;}
.btn-secondary{background:#e5e5e5;color:#333;}
.btn-outline{background:#fff;color:#22c55e;border:2px solid #22c55e;}
.btn-danger{background:#ef4444;color:#fff;}
#reader{width:100%;margin-bottom:12px;border-radius:8px;overflow:hidden;}
.result-box{display:none;margin-top:16px;padding:16px;background:#f0fdf4;border-radius:12px;text-align:center;}
.result-box .number{font-size:18px;font-weight:bold;color:#166534;margin-top:8px;}
.error-box{display:none;margin-top:12px;padding:12px;background:#fef2f2;border-radius:8px;text-align:center;color:#dc2626;font-size:14px;font-weight:bold;}
.manual-area{display:none;margin-top:16px;}
.manual-area input{width:100%;padding:12px;border:2px solid #e5e5e5;border-radius:8px;font-size:18px;text-align:center;margin-bottom:12px;}
.status{text-align:center;font-size:13px;color:#666;margin:8px 0;}
.divider{border:none;border-top:1px solid #e5e5e5;margin:16px 0;}
.debug{margin-top:8px;padding:6px;background:#f0f0f0;border-radius:4px;font-size:10px;color:#888;word-break:break-all;}
#fileInput{display:none;}
</style>
</head>
<body>
<div class="loading" id="loading">
<div class="spinner"></div>
<div>読み込み中...</div>
</div>
<iframe id="app"></iframe>
<div class="scan-page" id="scanPage">
<div class="scan-card">
<div class="scan-icon">💳</div>
<h2>ポイントカード登録</h2>

<div class="section-label">📷 実物カードをお持ちの方</div>
<div id="reader"></div>
<div class="status" id="status"></div>
<button class="btn btn-primary" id="startBtn">📷 カメラでスキャン</button>
<button class="btn btn-danger" id="stopBtn" style="display:none;">⏹ カメラを停止</button>

<hr class="divider">

<div class="section-label">📱 アプリ版をお使いの方</div>
<div class="section-hint">① 先にアプリでバーコードを表示<br>② スクリーンショットを撮る<br>③ ここに戻って↓をタップ</div>
<button class="btn btn-outline" id="fileBtn">🖼 スクショから読み取り</button>
<input type="file" id="fileInput" accept="image/*">

<hr class="divider">

<div class="section-label">✏️ うまくいかない場合</div>
<div class="section-hint">カードまたはアプリに表示されている番号をそのまま入力してください</div>
<button class="btn btn-secondary" id="manualBtn">番号を手入力</button>
<div class="manual-area" id="manualArea">
<input type="text" id="manualNo" placeholder="会員番号を入力してください" inputmode="numeric">
<button class="btn btn-primary" id="manualSubmit">登録する</button>
</div>

<div class="error-box" id="errorBox"></div>
<div class="debug" id="dbg">待機中</div>

<div class="result-box" id="resultBox">
<p>✅ 登録完了！</p>
<div class="number" id="memberNo"></div>
<p style="margin-top:12px;font-size:13px;color:#666;">2秒後に自動で閉じます...</p>
</div>
</div>
</div>
<script>
var LIFF_ID='2009608282-IAzNrGIA';
var GAS_URL='https://script.google.com/macros/s/AKfycbwqJPueCoeMtpY8WcCAHQjYXIROi8VAaqsbZmuf2iUQ65MG6teaJOC2CwZiGrUNlsd6/exec';
var params=new URLSearchParams(window.location.search);
var tab=params.get('tab')||'records';
var globalUserId='';
var scanner=null;
var dbg=document.getElementById('dbg');

liff.init({liffId:LIFF_ID}).then(function(){
  dbg.textContent='LIFF OK';
  return liff.getProfile();
}).then(function(profile){
  globalUserId=profile.userId;
  dbg.textContent='userId取得OK';
  if(tab==='scan'){showScanPage();}
  else{showIframe(profile.userId);}
}).catch(function(err){
  dbg.textContent='LIFFエラー:'+JSON.stringify(err);
  var userId=params.get('userId');
  if(userId){
    globalUserId=userId;
    if(tab==='scan'){showScanPage();}
    else{showIframe(userId);}
  }else{
    document.getElementById('loading').innerHTML='<div>LINEから開いてください</div>';
  }
});

function showIframe(userId){
  document.getElementById('app').src=GAS_URL+'?page='+tab+'&userId='+userId;
  document.getElementById('app').style.display='block';
  document.getElementById('loading').style.display='none';
}

function showScanPage(){
  document.getElementById('loading').style.display='none';
  document.getElementById('scanPage').style.display='block';
}

function extractCode(rawCode){
  var digits=rawCode.replace(/[^0-9]/g,'');
  if(digits.length===16) return digits;
  if(digits.length===24) return digits.substring(0,14);
  return null;
}

document.getElementById('startBtn').addEventListener('click',function(){
  dbg.textContent='カメラ起動中...';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('status').textContent='カメラ起動中...';
  scanner=new Html5Qrcode('reader');
  scanner.start(
    {facingMode:'environment'},
    {fps:10,qrbox:{width:280,height:150},formatsToSupport:[
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.ITF,
    ]},
    function(decodedText){
      dbg.textContent='スキャン成功:'+decodedText;
      document.getElementById('status').textContent='読み取り成功！';
      try{scanner.stop();}catch(e){}
      registerBarcode(decodedText);
    },
    function(){}
  ).then(function(){
    document.getElementById('status').textContent='バーコードをかざしてください';
    document.getElementById('startBtn').style.display='none';
    document.getElementById('stopBtn').style.display='block';
    dbg.textContent='カメラ起動OK';
  }).catch(function(err){
    document.getElementById('status').textContent='カメラ起動失敗';
    document.getElementById('manualArea').style.display='block';
    dbg.textContent='カメラエラー:'+err;
  });
});

document.getElementById('stopBtn').addEventListener('click',function(){
  if(scanner){try{scanner.stop();}catch(e){}}
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('status').textContent='';
});

document.getElementById('fileBtn').addEventListener('click',function(){
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change',function(e){
  var file=e.target.files[0];
  if(!file)return;
  document.getElementById('errorBox').style.display='none';
  document.getElementById('status').textContent='画像を解析中...';
  dbg.textContent='スクショ解析開始';

  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      canvas.width=img.width;
      canvas.height=Math.floor(img.height*0.25);
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,img.width,canvas.height,0,0,canvas.width,canvas.height);
      canvas.toBlob(function(blob){
        var croppedFile=new File([blob],'cropped.png',{type:'image/png'});
        var h=new Html5Qrcode('reader');
        dbg.textContent='上部1/4でスキャン中...';
        h.scanFile(croppedFile,true).then(function(decodedText){
          document.getElementById('status').textContent='';
          dbg.textContent='上部1/4で成功:'+decodedText;
          registerBarcode(decodedText);
        }).catch(function(){
          dbg.textContent='上部1/4失敗→全体でリトライ';
          h.scanFile(file,true).then(function(decodedText){
            document.getElementById('status').textContent='';
            dbg.textContent='全体で成功:'+decodedText;
            registerBarcode(decodedText);
          }).catch(function(){
            document.getElementById('status').textContent='';
            document.getElementById('errorBox').textContent='バーコードを検出できませんでした。手入力をお試しください。';
            document.getElementById('errorBox').style.display='block';
            document.getElementById('manualArea').style.display='block';
            dbg.textContent='全体でも失敗';
          });
        });
      },'image/png');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('manualBtn').addEventListener('click',function(){
  document.getElementById('manualArea').style.display='block';
});

document.getElementById('manualSubmit').addEventListener('click',function(){
  var no=document.getElementById('manualNo').value.trim();
  if(!no){alert('番号を入力してください');return;}
  registerBarcode(no);
});

function registerBarcode(rawCode){
  try{if(scanner)scanner.stop();}catch(e){}
  var code=extractCode(rawCode);
  var digits=rawCode.replace(/[^0-9]/g,'');
  dbg.textContent='読取:'+digits.length+'桁 → 保存:'+code;

  if(!code){
    document.getElementById('errorBox').textContent='正しいバーコードを読み取ってください。';
    document.getElementById('errorBox').style.display='block';
    return;
  }

  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('manualBtn').style.display='none';
  document.getElementById('fileBtn').style.display='none';
  document.getElementById('manualArea').style.display='none';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('status').style.display='none';
  document.getElementById('resultBox').style.display='block';
  document.getElementById('memberNo').textContent='登録が完了しました';

  var saveUrl=GAS_URL+'?page=save_barcode&userId='+globalUserId+'&barcode='+encodeURIComponent(code);
  dbg.textContent+=' → 送信中';
  var xhr=new XMLHttpRequest();
  xhr.open('GET',saveUrl,true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){dbg.textContent+=' → GAS:'+xhr.status;}
  };
  xhr.send();

  setTimeout(function(){
    try{liff.closeWindow();}catch(e){}
  },3000);
}

window.addEventListener('message',function(e){
  if(e.data==='closeLiff'){try{liff.closeWindow();}catch(e){}}
});
</script>
</body>
</html>
